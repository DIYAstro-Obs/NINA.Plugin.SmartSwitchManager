name: Build and Release Plugin

on:
  push:
    tags:
      - 'v*' # Trigger on tags like v1.0.0, v0.9.1 etc.

jobs:
  build_release:
    runs-on: windows-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Patch AssemblyInfo
      shell: pwsh
      run: |
        $Tag = "${{ github.ref_name }}"
        $VersionString = $Tag -replace '^v', ""
        # Extract only the numeric version for internal assembly/manifest files (e.g. 1.2.3.4-beta -> 1.2.3.4)
        $NumericPart = ($VersionString -split '-')[0]
        $Parts = $NumericPart.Split('.')
        
        $Major = if ($Parts.Length -gt 0) { $Parts[0] } else { "0" }
        $Minor = if ($Parts.Length -gt 1) { $Parts[1] } else { "0" }
        $Patch = if ($Parts.Length -gt 2) { $Parts[2] } else { "0" }
        $BuildNum = if ($Parts.Length -gt 3) { $Parts[3] } else { "0" }
        $FullVersion = "$Major.$Minor.$Patch.$BuildNum"
        
        $FilePath = "NINA.Plugin.SmartSwitchManager\Properties\AssemblyInfo.cs"
        $Content = Get-Content $FilePath -Raw
        $Content = $Content -replace '\[assembly: AssemblyVersion\(".*"\)\]', "[assembly: AssemblyVersion(`"$FullVersion`")]"
        $Content = $Content -replace '\[assembly: AssemblyFileVersion\(".*"\)\]', "[assembly: AssemblyFileVersion(`"$FullVersion`")]"
        Set-Content -Path $FilePath -Value $Content

    - name: Build Plugin
      shell: pwsh
      run: |
        $VersionString = "${{ github.ref_name }}".TrimStart('v')
        .\build.ps1 -Configuration Release -Version $VersionString

    - name: Patch Manifest
      shell: pwsh
      run: |
        $Tag = "${{ github.ref_name }}"
        $VersionString = $Tag -replace '^v', ""
        # Use only the numeric part for the N.I.N.A. manifest
        $NumericPart = ($VersionString -split '-')[0]
        $Parts = $NumericPart.Split('.')
        
        $Major = if ($Parts.Length -gt 0) { $Parts[0] } else { "0" }
        $Minor = if ($Parts.Length -gt 1) { $Parts[1] } else { "0" }
        $Patch = if ($Parts.Length -gt 2) { $Parts[2] } else { "0" }
        $BuildNum = if ($Parts.Length -gt 3) { $Parts[3] } else { "0" }
        
        # Calculate SHA256 of the generated zip
        $ZipPath = "build/NINA.Plugin.SmartSwitchManager.zip"
        $Hash = (Get-FileHash -Path $ZipPath -Algorithm SHA256).Hash.ToLower()
        
        Write-Host "Version parsed as: $Major.$Minor.$Patch.$BuildNum"
        Write-Host "Calculated Hash: $Hash"
        
        # Load and update the JSON contents
        $JsonPath = "manifest.json"
        $JsonData = Get-Content -Raw -Path $JsonPath | ConvertFrom-Json
        
        # Update JSON object properties
        $JsonData.Version.Major = $Major
        $JsonData.Version.Minor = $Minor
        $JsonData.Version.Patch = $Patch
        $JsonData.Version.Build = $BuildNum
        $JsonData.Installer.Checksum = $Hash
        
        # The URL dynamically points to the specific tag release
        $JsonData.Installer.URL = "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/NINA.Plugin.SmartSwitchManager.zip"
        
        # Save back the JSON temporarily for the upload step
        ConvertTo-Json -InputObject $JsonData -Depth 10 | Set-Content -Path $JsonPath

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          build/NINA.Plugin.SmartSwitchManager.zip
          manifest.json
        generate_release_notes: true
        prerelease: ${{ contains(github.ref_name, '-') }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
